# RULER arm definitions — LIVE arms only (the evalgaps ruler32k
# group). Every retired WP-era arm/group lives in git history;
# their results are final in docs/STATS.md.
# NOTE: earlier revisions used YAML merge anchors (<<: *defaults);
# this file is dumped resolved — run_matrix consumes it identically.
defaults:
  attn_implementation: window
  sliding_window: 2048
  mode: delta
  delta_lambda: 64
  decode_mode: dense
  stride_policy: fixed
  context_lengths:
  - 4096
  - 32768
  - 131072
  tasks:
  - niah_single_1
  - niah_single_2
  - niah_single_3
  - niah_multikey_1
  - niah_multikey_2
  - niah_multikey_3
  - niah_multivalue
  - niah_multiquery
  - vt
  - fwe
  - qa_1
  - qa_2
  n_samples: 250
  log_drift: false
smoke_overrides:
  context_lengths:
  - 4096
  tasks:
  - niah_single_1
  - niah_multikey_2
  - qa_1
  n_samples: 50
